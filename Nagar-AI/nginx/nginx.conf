worker_processes auto;
 
events {
    worker_connections 1024;
}
 
http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
 
    sendfile        on;
    keepalive_timeout 65;
    server_tokens off;
 
    gzip            on;
    gzip_vary       on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml
        font/woff
        font/woff2;
 
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;
 
    upstream nagarai_backend {
        server backend:8000;
    }
 
    server {
        listen 80;
        server_name localhost;
 
        root  /usr/share/nginx/html;
        index index.html;
 
        # ── Static assets (CSS, JS, images, fonts) ─────────────────────
        # Must be BEFORE the catch-all location /
        location ~* \.(css|js|ico|png|jpg|jpeg|gif|svg|woff|woff2|ttf|eot)$ {
            expires 7d;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }
 
        # ── API proxy — strip /api prefix, forward to FastAPI ──────────
        location /api/ {
            proxy_pass         http://nagarai_backend/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_connect_timeout 30s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;
        }
 
        # ── Backend health / docs pass-through ─────────────────────────
        location /health {
            proxy_pass http://nagarai_backend/health;
        }
 
        location /docs {
            proxy_pass http://nagarai_backend/docs;
            proxy_set_header Host $host;
        }
 
        location /openapi.json {
            proxy_pass http://nagarai_backend/openapi.json;
            proxy_set_header Host $host;
        }
 
        # ── SPA catch-all — all other routes serve index.html ──────────
        location / {
            try_files $uri $uri/ /index.html;
        }
 
        # Security headers
        add_header X-Frame-Options        "SAMEORIGIN"    always;
        add_header X-Content-Type-Options "nosniff"       always;
        add_header X-XSS-Protection       "1; mode=block" always;
 
        # Error pages
        error_page 404             /index.html;
        error_page 500 502 503 504 /index.html;
    }
}
 